name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint OpenAPI specs (PT + EN)
        run: npx --yes @redocly/cli lint openapi.yaml openapi.en.yaml
      # openapi.en.yaml é a tradução de openapi.yaml: apenas campos de
      # prosa podem diferir. Remove esses campos dos dois arquivos e
      # compara o restante — qualquer divergência estrutural
      # (endpoints, schemas, exemplos) quebra o build.
      - name: Check PT/EN structural parity
        run: |
          strip() {
            yq 'del(.. | .description?)
              | del(.. | .summary?)
              | del(.. | .title?)
              | del(.. | .tags?)
              | del(.. | .["x-codeSamples"]?)
              | del(.info.contact)
              | del(.info.["x-logo"])' "$1"
          }
          if ! diff -u <(strip openapi.yaml) <(strip openapi.en.yaml); then
            echo "::error::openapi.yaml e openapi.en.yaml divergiram estruturalmente. Aplique toda mudança de endpoints/schemas/exemplos nos dois arquivos (traduzindo apenas a prosa)."
            exit 1
          fi

  deploy:
    needs: lint
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
