openapi: 3.1.0
info:
  title: Yapoli DAM Integration API
  version: "1.0.0"
  summary: Public API for third-party integrations with the Yapoli DAM platform.
  x-logo:
    url: ../logo.jpg
    altText: Yapoli
    href: https://www.yapoli.com/
  description: |
    > Esta documentação também está disponível em **[Português (Brasil)](../)**.

    The **Yapoli DAM Integration API** lets third-party
    applications (ERPs, e-commerce back offices, workflow
    tools) authenticate as a registered Yapoli Application and
    exchange item and metadata information with a Yapoli
    tenant.

    This first version documents the endpoints used in catalog
    and item-management integrations:

    - Authenticating as a third-party application.
    - Searching items (including drafts and attribute/SKU
      lookup).
    - Creating, updating and deleting items and drafts.
    - Maintaining item variants (master attribute / variant
      attribute pairs).

    ## Getting started

    1. Ask your Yapoli account administrator to provision a
       third-party application. You will receive an `app_id`
       (UUID) and a password.
    2. Exchange those credentials for a bearer token by calling
       [`POST /api/app/login`](#operation/loginApp).
    3. Call every other `/api/app/*` endpoint with the
       `Authorization: Bearer <token>` header.

    ## Authentication model

    - **Login** uses HTTP Basic authentication. The `app_id` is
      sent as the username and the application password as the
      password. The response contains a JWT bearer token.
    - **Every other endpoint** requires that token in the
      `Authorization: Bearer <token>` header.
    - Tokens expire. By default they are valid for **10 hours**
      from issuance (this may vary depending on the environment
      configuration). When a call returns `401`, call
      `POST /api/app/login` again to obtain a fresh token —
      there is no dedicated refresh endpoint for application
      tokens.

    ## Distributions

    A **distribution** is a delivery channel configured in your
    Yapoli tenant — it defines *where* and *how* the assets
    derived from items (images, videos, documents) are
    published. Each tenant can have several distributions, each
    one pointing to a different destination (e.g. the public
    website's CDN, a partner's FTP, a private bucket for an
    integration).

    Each distribution carries:

    - **Recipes** — transformations applied to the assets
      before publication (resizing, format conversion, etc.).
    - **Delivery type** — currently `CDN` (default) or `FTP`.
    - **Identifier** — UUID used to select the distribution in
      API calls.

    ### How the distribution affects your calls

    When authenticating via `POST /api/app/login`, you may send
    `distribution_id` in the body:

    - **Sending `distribution_id`**: the token is scoped to
      that distribution. Item searches only return items
      published in it.
    - **Omitting `distribution_id`**: the token uses the
      default distribution associated with your application in
      Yapoli.

    In the `POST /api/app/items` response, each item carries
    the `distribution.distribution_id` field indicating which
    distribution it belongs to.

    ## Attributes and data types

    **Attributes are dynamic and defined per tenant.** Each
    Yapoli tenant maintains its own catalog of attributes
    (metadata), created by the administrators as the business
    requires. There is no fixed list of attributes in the API —
    each attribute is identified by an `attribute_id` (UUID)
    issued in your tenant.

    Ask your Yapoli account administrator for the list of
    attributes your application needs to read/write.

    ### How to send attribute values

    When creating or updating an item, every entry in the
    `attributes` array has the same shape — what changes is the
    form of the `value` field, according to the type configured
    in the tenant's catalog. The supported types are
    **`text`**, **`number`**, **`date`** and **`list`**.

    #### `text` — free text

    A plain string.

    ```json
    {
      "attribute_id": "99ffea1c-c385-4746-84c8-79d4d009c9a8",
      "label": "PACKAGING TYPE",
      "value": "BOX"
    }
    ```

    #### `number` — numeric

    Accepts integers and decimals. It can be sent as a number
    or as a string — the backend performs the conversion.

    ```json
    {
      "attribute_id": "19e03dae-8850-40b9-b66e-df26f9869324",
      "label": "PAIRS PER PACKAGE",
      "value": 12
    }
    ```

    ```json
    {
      "attribute_id": "775d962b-5553-4ad5-b98a-b4c6af98dbde",
      "label": "CUBIC METER (M³)",
      "value": "0.035"
    }
    ```

    #### `date` — ISO-8601 date or date/time

    Accepts a date only (`YYYY-MM-DD`) or a date/time with
    timezone.

    ```json
    {
      "attribute_id": "b3e2b6f9-3a52-4ba2-8c0d-9c7b17af0f11",
      "label": "AVAILABLE FROM",
      "value": "2026-04-22"
    }
    ```

    ```json
    {
      "attribute_id": "b3e2b6f9-3a52-4ba2-8c0d-9c7b17af0f11",
      "label": "PUBLISHED AT",
      "value": "2026-04-22T10:30:00Z"
    }
    ```

    #### `list` — enumerated list value

    Send one of the options registered in the tenant. For
    attributes configured as single-select, `value` is a
    string; when configured as multi-select
    (`list_type: "multiple"`), send an array.

    ```json
    {
      "attribute_id": "a48cd0d4-cc7e-4c06-8691-faef6a329ec4",
      "label": "DUN CATEGORY",
      "value": "YD"
    }
    ```

    ```json
    {
      "attribute_id": "a48cd0d4-cc7e-4c06-8691-faef6a329ec4",
      "label": "DUN CATEGORY",
      "value": ["YD", "RD", "BL"]
    }
    ```

    If your application was configured with
    `list_value_implicit_registration`, new values are added to
    the catalog automatically when the item is
    created/updated. Otherwise, sending a value that does not
    exist in the list returns `422`.

    ## Response envelope

    Successful responses return the payload **directly** as the
    JSON body (without a `data` key wrapping the content). Two
    custom headers are always present:

    | Header              | Meaning                                        |
    | ------------------- | ---------------------------------------------- |
    | `X-Status-Response` | `1` on success, `0` on error.                  |
    | `X-Message`         | Short human-readable message about the result. |

    Error responses follow the same format, but with a non-2xx
    HTTP status and an `errors` object describing per-field
    validation failures, when applicable.

    > **Note:** human-readable messages produced by the API —
    > the `X-Message` header and the `message` / `errors`
    > fields of error bodies — may be returned in Portuguese.
    > The response examples in this reference show literal API
    > payloads, which is why some of them appear in Portuguese.

    ## Rate limiting

    All `/api/app/*` endpoints share a single rate-limit bucket
    (`app-api`). When the limit is exceeded, the response
    returns `429 Too Many Requests` with a `Retry-After` header
    indicating how many seconds to wait before trying again.

    ## Typical item creation flow

    ```text
    ┌────────────────────────┐
    │ POST /api/app/login    │  (once per session, Basic auth)
    └──────────┬─────────────┘
               │ bearer token
               ▼
    ┌────────────────────────┐
    │ POST /api/app/item     │  creates a draft  (is_draft: true)
    └──────────┬─────────────┘
               │ item id
               ▼
    ┌────────────────────────┐
    │ PATCH /api/item/{id}/  │  (optional) one call per
    │        variant         │  variant attribute
    └──────────┬─────────────┘
               │
               ▼
    ┌────────────────────────┐
    │ PUT /api/app/item/{id} │  publishes / finalizes
    └────────────────────────┘
    ```

    The **PATCH** step is optional — use it only when the item
    has variants to register. Items without variants go
    straight from `POST /api/app/item` to the final
    `PUT /api/app/item/{id}`.
  contact:
    name: Yapoli Support
    email: suporte@yapoli.com
    url: https://www.yapoli.com/

servers:
  - url: https://service.yapoli.io
    description: Production
  - url: https://service-staging.yapoli.io
    description: Staging

tags:
  - name: Authentication
    description: |
      Obtain the bearer tokens used to authorize every other
      call.
  - name: Items
    description: |
      Create, update, delete and search items (products,
      assets, drafts) in a Yapoli tenant.
  - name: Variants
    description: |
      Maintain variant relationships between a master attribute
      value and variant attribute values (e.g. color, size,
      packaging type).

security:
  - bearerAuth: []

paths:
  /api/app/login:
    post:
      tags: [Authentication]
      summary: Exchange application credentials for a bearer token
      operationId: loginApp
      description: |
        Authenticates a third-party application using HTTP
        Basic authentication. Send the `app_id` (UUID issued by
        Yapoli) as the username and the application password as
        the password. Tokens are application-scoped JWTs; store
        them securely.

        Optionally, the token can be restricted to a specific
        distribution by sending `distribution_id` in the JSON
        body.
      security:
        - basicAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                distribution_id:
                  type: string
                  format: uuid
                  description: |
                    Optional distribution context. When sent,
                    the token becomes scoped to this
                    distribution and item searches will be
                    restricted to it.
            example:
              distribution_id: "5f7c2d30-1a4e-4b8a-9c3a-8b0a1d5e2f10"
      responses:
        "200":
          description: Authentication succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
              example:
                token: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhcHAifQ.xxxxx
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Acesso negado.
        "422":
          description: Missing or invalid `app_id` / `password` parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Parâmetros inválidos.
                errors:
                  app_id: ["App ID é obrigatório"]
      x-codeSamples:
        - lang: curl
          label: curl
          source: |
            curl -X POST https://service.yapoli.io/api/app/login \
              -u "00000000-0000-0000-0000-000000000000:s3cret" \
              -H "Content-Type: application/json" \
              -d '{"distribution_id":"5f7c2d30-1a4e-4b8a-9c3a-8b0a1d5e2f10"}'

  /api/app/items:
    post:
      tags: [Items]
      summary: Search items
      operationId: searchItems
      description: |
        Returns a paginated list of items visible to the
        authenticated application.

        This single endpoint covers three common use cases. In
        all of them, **always send `fields`** to restrict the
        projection to what your application actually consumes —
        this reduces the payload and improves search
        performance:

        | Use case                | How                                                                 |
        | ----------------------- | ------------------------------------------------------------------- |
        | List published items    | Send `{ "fields": [...] }`.                                         |
        | List drafts             | Send `"isDraft": true` along with `fields`.                         |
        | Search by attribute/SKU | Use `filters` with `filter_value.{attribute_id}` along with `fields`.|

        ### Pagination

        Two modes are supported:

        - **Page-based pagination** — send `page` and
          `rowsPerPage` for traditional offset pagination.
          Simple, but expensive once the result set grows
          beyond a few thousand rows.
        - **Cursor-based pagination** (recommended for large
          volumes) — omit `page`. The first response returns
          `pit` and `search_after`; send both in the next
          request.

        ### Field projection

        Use `fields` to choose which item attributes are
        returned. The special value `"tags"` includes asset tag
        arrays; `"dimensions"` includes asset dimension
        objects. When `metadata_values` is `true` (the
        default), attribute values are attached to each item
        under the `attribute` key.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemSearchRequest"
            examples:
              listPublished:
                summary: List published items (default)
                value:
                  fields: [id, category, segment, division, name]
                  metadata_values: true
              listDrafts:
                summary: List drafts only
                value:
                  isDraft: true
                  fields: [id, category, segment, division, name]
                  metadata_values: true
              searchBySku:
                summary: Search an item by SKU
                value:
                  fields: [id, category, segment, division, name]
                  metadata_values: true
                  filters:
                    filter_value.b67db1a7-c9c4-4c29-9081-7cf4d548a7eb: "7896419700012"
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemSearchResponse"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No item matches the given filters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Nenhum item encontrado
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds to wait before trying again.
      x-codeSamples:
        - lang: curl
          label: curl
          source: |
            curl -X POST https://service.yapoli.io/api/app/items \
              -H "Authorization: Bearer <token>" \
              -H "Content-Type: application/json" \
              -d '{
                "fields": ["id","category","segment","division","name"],
                "metadata_values": true,
                "filters": {
                  "filter_value.b67db1a7-c9c4-4c29-9081-7cf4d548a7eb": "7896419700012"
                }
              }'

  /api/app/item:
    post:
      tags: [Items]
      summary: Create an item or draft
      operationId: createItem
      description: |
        Creates a new item in the authenticated application's
        tenant.

        Send `"is_draft": true` to create it as a draft —
        drafts do not appear in the default item search and can
        be updated freely until they are ready for publication.

        The `attributes` array defines the custom metadata.
        Each attribute is identified by its `attribute_id`
        (UUID). The `label` field is optional and descriptive;
        the `attribute_id` is what uniquely identifies the
        metadata slot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemCreateRequest"
            example:
              category_id: eb5cbb04-a2ce-491d-bdef-ce1c5577353f
              segment_id: ac6a0bf6-9407-4df8-8cb8-f93235ce734c
              name: ITEM-EXEMPLO-001
              description: "Item de exemplo para demonstração da API"
              is_draft: true
              published: true
              attributes:
                - attribute_id: a48cd0d4-cc7e-4c06-8691-faef6a329ec4
                  label: DUN CATEGORY
                  value: "YD"
                - attribute_id: 19e03dae-8850-40b9-b66e-df26f9869324
                  label: PAIRS PER PACKAGE
                  value: "12"
                - attribute_id: 99ffea1c-c385-4746-84c8-79d4d009c9a8
                  label: PACKAGING TYPE
                  value: "BOX"
                - attribute_id: 775d962b-5553-4ad5-b98a-b4c6af98dbde
                  label: CUBIC METER (M³)
                  value: "0.035"
                - attribute_id: 773df90d-4818-4a73-80c6-ad3ddeea8150
                  label: DUN
                  value: "7896419700012"
      responses:
        "201":
          description: Item (or draft) created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedResponse"
              example:
                id: d5ef27a1-4eef-4e8c-b6d0-27fcbd6a5e14
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: The caller is not allowed to create items in the target tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid data (missing required field, malformed UUID, etc.).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Parâmetros inválidos
                errors:
                  category_id: ["category_id é obrigatório"]
      x-codeSamples:
        - lang: curl
          label: curl
          source: |
            curl -X POST https://service.yapoli.io/api/app/item \
              -H "Authorization: Bearer <token>" \
              -H "Content-Type: application/json" \
              -d @create-item.json

  /api/app/item/{id}:
    parameters:
      - $ref: "#/components/parameters/ItemId"
    put:
      tags: [Items]
      summary: Update an item by ID
      operationId: updateItem
      description: |
        Partially updates an existing item. Send only the
        fields you want to change. The `attributes` array, when
        present, **replaces** the existing set — to preserve
        unrelated attributes, read the item first and resend
        them unchanged.

        When you don't have the item's UUID but know a unique
        attribute (e.g. SKU, DUN, EAN), use
        [`PUT /api/app/item/by-attribute`](#operation/updateItemByAttribute)
        to update it in a single step, without having to search
        for the item first.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdateRequest"
            example:
              attributes:
                - attribute_id: a48cd0d4-cc7e-4c06-8691-faef6a329ec4
                  label: DUN CATEGORY
                  value: "YD"
                - attribute_id: 847c0e41-ca5c-46bc-ac07-37b24465f8b7
                  label: SIZE GROUP
                  value: "02"
                - attribute_id: 71821f8a-1ce7-420a-b225-e1a08dd4f6f8
                  label: UPC
                  value: "7891234567890"
                - attribute_id: 73cdaa9b-f6ee-4301-b6c4-89b86b81a0e0
                  label: EAN
                  value: "7891234567890"
      responses:
        "200":
          description: Item updated. The body includes the updated taxonomy name.
          content:
            application/json:
              schema:
                type: object
                properties:
                  taxonomy:
                    type: string
                    description: Updated taxonomy after the change.
              example:
                taxonomy: ITEM-EXEMPLO-001
        "204":
          description: Item updated (no changed fields to return).
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: The caller is not allowed to manage this item.
        "404":
          description: Item not found.
        "422":
          description: Invalid data.
    delete:
      tags: [Items]
      summary: Delete an item or draft
      operationId: deleteItem
      description: |
        Permanently removes an item or draft from the tenant.
        This operation is irreversible. If the item has
        published dependencies, the call fails with `403`.
      responses:
        "204":
          description: Item deleted.
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: The caller is not allowed to delete this item.
        "404":
          description: Item not found.

  /api/app/item/{id}/asset/upload:
    parameters:
      - $ref: "#/components/parameters/ItemId"
    post:
      tags: [Items]
      summary: Upload asset(s) to an item
      operationId: uploadItemAssets
      description: |
        Uploads one or more files as **assets** of an existing
        item. The files are stored in Yapoli's storage and go
        through the processing pipeline (thumbnail generation,
        normalization, indexing); processing is asynchronous
        and the asset becomes available for download once the
        pipeline finishes.

        The request **must be `multipart/form-data`**, with the
        `files` field containing one or more files.

        ### Upload modes

        The environment operates in one of two modes
        (configured by Yapoli when the tenant is deployed):

        | Mode          | Files per request | Accepted extensions                                                  |
        | ------------- | ----------------- | --------------------------------------------------------------------- |
        | `restricted`  | 1                 | `htm`, `html`                                                          |
        | `full`        | several           | images, videos, audio, docs, design files, archives, etc.             |

        If the environment is in `restricted` mode, sending
        more than one file or any extension outside the list
        returns `422`. Check with your Yapoli administrator
        which mode is active.

        ### Prerequisites

        The authenticating application must have the
        `with_upload` flag enabled in the tenant. Without it,
        the call returns `403` even with a valid token.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  description: |
                    One or more files to upload (in
                    `restricted` mode, only one).
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Upload finished and asset(s) linked to the item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetUploadResponse"
              example:
                item_id: d5ef27a1-4eef-4e8c-b6d0-27fcbd6a5e14
                uploaded_asset_ids:
                  - 5b3a8c92-0f9d-4aef-9f25-3c4e1a7b6f11
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |
            The application does not have upload permission
            (`with_upload` disabled) or the caller cannot
            manage the item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: |
            Missing file, extension not allowed, or more than
            one file in `restricted` mode.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Parâmetros inválidos
                errors:
                  files: ["Extension 'exe' is not allowed in full mode."]
      x-codeSamples:
        - lang: curl
          label: curl
          source: |
            curl -X POST "https://service.yapoli.io/api/app/item/d5ef27a1-4eef-4e8c-b6d0-27fcbd6a5e14/asset/upload" \
              -H "Authorization: Bearer <token>" \
              -F "files[]=@/path/to/photo.jpg"

  /api/app/item/{id}/asset/presign:
    parameters:
      - $ref: "#/components/parameters/ItemId"
    post:
      tags: [Items]
      summary: Get a presigned URL to upload an asset directly to storage
      operationId: presignItemAsset
      description: |
        Returns a **presigned `PUT` URL** so the file can be
        uploaded **directly to storage (S3)** — the bytes do
        **not** pass through the API. Use this instead of
        [`POST .../asset/upload`](#operation/uploadItemAssets)
        for **large files** (e.g. videos of several GB), where
        streaming through the API server is slow or memory-heavy.

        ### Flow

        1. `POST` this endpoint with the `filename`; you receive a
           `put_url` valid for **4 hours**.
        2. `PUT` the file bytes to `put_url` — send it directly to
           storage and do **not** add an `Authorization` header
           (the URL is already signed). A successful upload
           returns `200`.
        3. Processing is **asynchronous**: once the file lands in
           storage the pipeline creates the asset and links it to
           the item automatically (thumbnails, normalization,
           indexing). No confirmation call is required.

        Any file extension is accepted here (unlike the
        `restricted` mode of `.../asset/upload`).

        ### Prerequisites

        The authenticating application must have the `with_upload`
        flag enabled; otherwise the call returns `403`.

        > Note: if the presigned URL is signed with temporary
        > (STS) credentials, its effective lifetime is capped by
        > the credential session, which may be shorter than the
        > requested 4 hours.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename]
              properties:
                filename:
                  type: string
                  description: |
                    Original file name. Used as the last segment of
                    the storage key; the pipeline derives the file
                    extension from it.
            example:
              filename: video.mp4
      responses:
        "201":
          description: Presigned URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignResponse"
              example:
                asset_id: a00637f0-9ed5-4559-b59a-4bfe80a7040f
                s3_key: <client>/<region>/<app>/web/<item_id>/<asset_id>/video.mp4
                bucket: yapoli-bucket-item-sp
                put_url: https://<bucket>.s3.<region>.amazonaws.com/<key>?X-Amz-Expires=14400&X-Amz-Signature=...
                put_headers:
                  Host: ["<bucket>.s3.<region>.amazonaws.com"]
                expires_in: 14400
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: The application does not have upload permission (`with_upload` disabled).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Request validation failed (e.g. missing `filename`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      x-codeSamples:
        - lang: curl
          label: 1. Get the presigned URL
          source: |
            curl -X POST "https://service.yapoli.io/api/app/item/<item_id>/asset/presign" \
              -H "Authorization: Bearer <token>" \
              -H "Content-Type: application/json" \
              -d '{ "filename": "video.mp4" }'
        - lang: curl
          label: 2. Upload the file straight to storage
          source: |
            curl -X PUT "<put_url>" --upload-file /path/to/video.mp4

  /api/app/item/by-attribute:
    put:
      tags: [Items]
      summary: Update an item by unique attribute lookup
      operationId: updateItemByAttribute
      description: |
        Updates an item without needing its UUID: the API looks
        the item up by the value of a unique attribute (for
        example SKU, DUN or EAN) and applies the same flow as
        [`PUT /api/app/item/{id}`](#operation/updateItem).

        Besides the regular update fields, the body must
        include:

        - `lookup_attribute_id` — UUID of the lookup attribute.
        - `lookup_attribute_value` — value to look for.

        The chosen attribute must be **unique** in the tenant:
        if the lookup returns more than one item, the call
        fails with `422` to prevent accidental updates. If no
        item matches, it returns `404`.

        Once the item is resolved, the rest of the body is
        applied exactly as in `updateItem` — including the rule
        that `attributes`, when sent, replaces the existing
        list.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdateByAttributeRequest"
            example:
              lookup_attribute_id: 773df90d-4818-4a73-80c6-ad3ddeea8150
              lookup_attribute_value: "7896419700012"
              attributes:
                - attribute_id: 847c0e41-ca5c-46bc-ac07-37b24465f8b7
                  label: SIZE GROUP
                  value: "02"
                - attribute_id: 71821f8a-1ce7-420a-b225-e1a08dd4f6f8
                  label: UPC
                  value: "7891234567890"
      responses:
        "200":
          description: Item found and updated. Body carries the refreshed taxonomy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  taxonomy:
                    type: string
                    description: Updated taxonomy after the change.
              example:
                taxonomy: ITEM-EXEMPLO-001
        "204":
          description: Item found and updated (no fields to return).
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: The caller is not allowed to manage the matched item.
        "404":
          description: No item found with the given attribute.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Item not found with given attribute value
        "422":
          description: |
            Invalid data — `lookup_attribute_id` / `lookup_attribute_value`
            missing, or the lookup returned more than one item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Multiple items found. Attribute value is not unique.
      x-codeSamples:
        - lang: curl
          label: curl
          source: |
            curl -X PUT https://service.yapoli.io/api/app/item/by-attribute \
              -H "Authorization: Bearer <token>" \
              -H "Content-Type: application/json" \
              -d '{
                "lookup_attribute_id": "773df90d-4818-4a73-80c6-ad3ddeea8150",
                "lookup_attribute_value": "7896419700012",
                "attributes": [
                  { "attribute_id": "847c0e41-ca5c-46bc-ac07-37b24465f8b7", "label": "SIZE GROUP", "value": "02" }
                ]
              }'

  /api/item/{id}/variant:
    parameters:
      - $ref: "#/components/parameters/ItemId"
    patch:
      tags: [Variants]
      summary: Add or update a variant attribute value
      operationId: saveVariant
      description: |
        Associates a variant attribute value with a master
        attribute value on the given item. This endpoint must
        be called once for each variant attribute you want to
        store.

        A variant is defined by two pairs:

        - `master_attribute_id` + `master_attribute_value` —
          the discriminator that groups the variants
          (e.g. a product code).
        - `variant_attribute_id` + `variant_attribute_value` —
          the attribute whose value changes across variants
          (e.g. packaging type, pairs per package, DUN).

        To add several variant dimensions to the same master
        value, call the endpoint repeatedly with the same
        `master_attribute_id` / `master_attribute_value` and
        different `variant_attribute_id` /
        `variant_attribute_value` pairs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VariantRequest"
            examples:
              pairsPerPackage:
                summary: PAIRS PER PACKAGE
                value:
                  variant:
                    master_attribute_id: a48cd0d4-cc7e-4c06-8691-faef6a329ec4
                    master_attribute_value: "YD"
                    variant_attribute_id: 19e03dae-8850-40b9-b66e-df26f9869324
                    variant_attribute_value: "12"
              packagingType:
                summary: PACKAGING TYPE
                value:
                  variant:
                    master_attribute_id: a48cd0d4-cc7e-4c06-8691-faef6a329ec4
                    master_attribute_value: "YD"
                    variant_attribute_id: 99ffea1c-c385-4746-84c8-79d4d009c9a8
                    variant_attribute_value: "BOX"
              cubicMeter:
                summary: CUBIC METER
                value:
                  variant:
                    master_attribute_id: a48cd0d4-cc7e-4c06-8691-faef6a329ec4
                    master_attribute_value: "YD"
                    variant_attribute_id: 775d962b-5553-4ad5-b98a-b4c6af98dbde
                    variant_attribute_value: "0.035"
              dun:
                summary: DUN
                value:
                  variant:
                    master_attribute_id: a48cd0d4-cc7e-4c06-8691-faef6a329ec4
                    master_attribute_value: "YD"
                    variant_attribute_id: 773df90d-4818-4a73-80c6-ad3ddeea8150
                    variant_attribute_value: "7896419700012"
      responses:
        "200":
          description: Variant saved.
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: The caller is not allowed to manage this item.
        "404":
          description: Item not found.
        "422":
          description: Invalid variant payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        HTTP Basic auth used only on `POST /api/app/login`. The
        username is the `app_id` (UUID); the password is the
        application secret issued by Yapoli.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT returned by `POST /api/app/login`. Send it as
        `Authorization: Bearer <token>` on every non-login
        call.

  parameters:
    ItemId:
      name: id
      in: path
      required: true
      description: UUID of the item to operate on.
      schema:
        type: string
        format: uuid

  schemas:
    TokenResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: |
            JWT bearer token. Send it as
            `Authorization: Bearer <token>` on every non-login
            call.
          example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Human-readable error message. May be returned in Portuguese.
          example: Parâmetros inválidos.
        errors:
          type: object
          description: |
            Per-field validation errors. Keys are field names
            and values are arrays of error messages.
          additionalProperties:
            type: array
            items:
              type: string
          example:
            app_id: ["App ID é obrigatório"]

    CreatedResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
          description: UUID of the newly created resource.

    AssetUploadResponse:
      type: object
      required: [item_id, uploaded_asset_ids]
      properties:
        item_id:
          type: string
          format: uuid
          description: UUID of the item the assets were linked to.
        uploaded_asset_ids:
          type: array
          description: |
            UUIDs of the created assets, in the same order the
            files were sent. Each asset may still be processing
            in Yapoli's pipeline right after the response.
          items:
            type: string
            format: uuid

    PresignResponse:
      type: object
      required: [asset_id, s3_key, bucket, put_url, expires_in]
      properties:
        asset_id:
          type: string
          format: uuid
          description: UUID reserved for the asset (embedded in the storage key).
        s3_key:
          type: string
          description: Full storage object key the file must be uploaded to.
        bucket:
          type: string
          description: Target bucket name.
        put_url:
          type: string
          description: |
            Presigned `PUT` URL (valid for ~4 hours). Upload the
            raw file bytes here with an HTTP `PUT`.
        put_headers:
          type: object
          description: |
            Headers that must be replicated on the `PUT` request,
            when present. Usually just `Host`.
          additionalProperties: true
        expires_in:
          type: integer
          description: URL lifetime in seconds (14400 = 4 hours).
          example: 14400

    ItemAttributeInput:
      type: object
      required: [attribute_id, value]
      properties:
        attribute_id:
          type: string
          format: uuid
          description: |
            Identifier of the metadata attribute as registered
            in your Yapoli tenant. Ask your Yapoli
            administrator for the attribute catalog.
        value:
          description: |
            Value to store. Usually a string, but numeric and
            boolean values are also accepted depending on the
            attribute type.
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items:
                type: string
        label:
          type: string
          description: |
            Optional display label. It is not used by the
            server for matching — the `attribute_id` is what
            counts — but it is useful in code and logs.

    ItemCreateRequest:
      type: object
      required: [name, description, category_id, segment_id]
      properties:
        name:
          type: string
          description: Human-readable item name.
          example: ITEM-EXEMPLO-001
        description:
          type: string
          description: Free-text description.
        category_id:
          type: string
          format: uuid
          description: UUID of the item's category in the tenant.
        segment_id:
          type: string
          format: uuid
          description: UUID of the item's segment in the tenant.
        is_draft:
          type: boolean
          default: false
          description: |
            When `true`, the item is created as a draft and
            will not appear in published-item searches until it
            is updated with `is_draft: false` or published.
        published:
          type: boolean
          description: |
            When `true` and the caller has publish permission,
            the item becomes visible immediately. Ignored for
            drafts.
        attributes:
          type: array
          description: Custom metadata values attached to the item.
          items:
            $ref: "#/components/schemas/ItemAttributeInput"
        assets:
          type: array
          description: |
            Optional list of asset UUIDs to associate with the
            item at creation time.
          items:
            type: string
            format: uuid

    ItemUpdateRequest:
      type: object
      description: |
        All fields are optional — only the ones included are
        updated. The `attributes` field, when present,
        **replaces** the existing attribute list.
      properties:
        name:
          type: string
        description:
          type: string
        category_id:
          type: string
          format: uuid
        segment_id:
          type: string
          format: uuid
        published:
          type: boolean
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/ItemAttributeInput"
        assets:
          type: array
          items:
            type: string
            format: uuid

    ItemUpdateByAttributeRequest:
      allOf:
        - type: object
          required: [lookup_attribute_id, lookup_attribute_value]
          properties:
            lookup_attribute_id:
              type: string
              format: uuid
              description: |
                UUID of the attribute to use as the lookup key.
                It must be unique in the tenant (e.g. SKU, DUN,
                EAN).
            lookup_attribute_value:
              type: string
              description: Attribute value to look for.
        - $ref: "#/components/schemas/ItemUpdateRequest"

    ItemSearchRequest:
      type: object
      description: |
        Send at least the `fields` field to restrict the
        projection to what your application needs. The
        remaining fields are optional and filter or paginate
        the result.
      properties:
        fields:
          type: array
          description: |
            Subset of top-level fields to include in each
            returned item. Common values: `id`, `name`,
            `category`, `segment`, `division`, `tags`,
            `dimensions`.
          items:
            type: string
          example: [id, category, segment, division, name]
        metadata_values:
          type: boolean
          default: true
          description: |
            When `true`, attaches the attribute values to each
            item under the `attribute` key.
        isDraft:
          type: boolean
          description: |
            When `true`, returns only drafts and ignores
            distribution scoping. Defaults to `false`.
        filters:
          type: object
          description: |
            Exact-match filters, keyed by field name. Use
            `filter_value.{attribute_id}` to filter by a custom
            attribute, for example by SKU/DUN/EAN.
          additionalProperties: true
          example:
            filter_value.b67db1a7-c9c4-4c29-9081-7cf4d548a7eb: "7896419700012"
        searchKeywords:
          type: array
          items:
            $ref: "#/components/schemas/SearchKeyword"
          description: |
            Keyword-style filters. Prefer `filters` for exact
            matching; `searchKeywords` is meant for full-text /
            normalized searches.
        rowsPerPage:
          type: integer
          default: 1000
          minimum: 1
          maximum: 10000
          description: |
            Page size. Ignored in cursor mode on subsequent
            requests.
        page:
          type: integer
          minimum: 1
          description: |
            Page number (1-based) for offset pagination. Omit
            it to use cursor pagination.
        fromDate:
          type: string
          format: date-time
          description: |
            Returns only items created or updated from this
            timestamp (ISO-8601) onwards.
        outputAssetReferences:
          type: boolean
          default: false
          description: Includes raw asset reference IDs in the response.
        pit:
          type: string
          description: |
            Point-in-time identifier returned by a previous
            cursor response. Send it back to keep paginating.
        search_after:
          type: array
          items: {}
          description: |
            Cursor token returned by a previous cursor
            response.

    SearchKeyword:
      type: object
      required: [field, value]
      properties:
        field:
          type: string
          description: "Field name (e.g. `category`, `division`, `name`)."
          example: category
        value:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          example: packaging

    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: ITEM-EXEMPLO-001
        taxonomy:
          type: object
          properties:
            name:
              type: string
              example: Item Exemplo 001
            slug:
              type: string
              example: item-exemplo-001
        category:
          $ref: "#/components/schemas/NamedRef"
        segment:
          $ref: "#/components/schemas/NamedRef"
        division:
          $ref: "#/components/schemas/NamedRef"
        attribute:
          type: object
          description: |
            Metadata values keyed by attribute name. Present
            when `metadata_values` is `true` in the request.
          additionalProperties: true
        updated_at:
          type: string
          format: date-time
        distribution:
          type: object
          properties:
            distribution_id:
              type: string
              format: uuid

    NamedRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string

    ItemSearchResponse:
      type: object
      required: [total, items]
      properties:
        total:
          type: integer
          description: Total number of matching items.
          example: 1342
        from:
          type: [integer, "null"]
        to:
          type: [integer, "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        pit:
          type: string
          description: |
            Point-in-time identifier for cursor pagination.
            Present when `page` is omitted in the request.
        search_after:
          type: array
          items: {}
          description: |
            Cursor token. Send it back in the next request to
            fetch the next page.

    VariantRequest:
      type: object
      required: [variant]
      properties:
        variant:
          type: object
          required:
            - master_attribute_id
            - master_attribute_value
            - variant_attribute_id
            - variant_attribute_value
          properties:
            master_attribute_id:
              type: string
              format: uuid
              description: UUID of the master attribute (discriminator).
            master_attribute_value:
              type: string
              description: Master attribute value for this variant group.
            variant_attribute_id:
              type: string
              format: uuid
              description: UUID of the variant attribute being set.
            variant_attribute_value:
              type: string
              description: Variant attribute value.
